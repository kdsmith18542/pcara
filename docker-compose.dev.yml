version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: pcara-postgres-dev
    environment:
      POSTGRES_DB: pcara_dev
      POSTGRES_USER: pcara_user
      POSTGRES_PASSWORD: pcara_dev_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pcara_user -d pcara_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for Job Queue and Caching
  redis:
    image: redis:7-alpine
    container_name: pcara-redis-dev
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  # ChromaDB Vector Database
  chromadb:
    image: chromadb/chroma:latest
    container_name: pcara-chromadb-dev
    ports:
      - "8001:8000"
    volumes:
      - chromadb_data:/chroma/chroma
    environment:
      CHROMA_SERVER_HOST: 0.0.0.0
      CHROMA_SERVER_HTTP_PORT: 8000

  # API Gateway and Core Services
  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile.dev
    container_name: pcara-api-gateway-dev
    ports:
      - "8081:8080"
    environment:
      DATABASE_URL: postgresql://pcara_user:pcara_dev_password@postgres:5432/pcara_dev
      REDIS_URL: redis://redis:6379
      CHROMA_URL: http://chromadb:8000
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      chromadb:
        condition: service_started
    volumes:
      - ./services/api-gateway:/app
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

  # Python Code Analyzer Worker
  python-analyzer:
    build:
      context: ./services/analyzers/python
      dockerfile: Dockerfile.dev
    container_name: pcara-python-analyzer-dev
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://pcara_user:pcara_dev_password@postgres:5432/pcara_dev
    depends_on:
      - redis
      - postgres
    volumes:
      - ./services/analyzers/python:/app
      - /tmp/pcara-repos:/tmp/repos
    restart: unless-stopped

  # C# Code Analyzer Worker
  csharp-analyzer:
    build:
      context: ./services/analyzers/csharp
      dockerfile: Dockerfile.dev
    container_name: pcara-csharp-analyzer-dev
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://pcara_user:pcara_dev_password@postgres:5432/pcara_dev
    depends_on:
      - redis
      - postgres
    volumes:
      - ./services/analyzers/csharp:/app
      - /tmp/pcara-repos:/tmp/repos
    restart: unless-stopped

  # JavaScript/TypeScript Code Analyzer Worker
  javascript-analyzer:
    build:
      context: ./services/analyzers/javascript
      dockerfile: Dockerfile.dev
    container_name: pcara-javascript-analyzer-dev
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://pcara_user:pcara_dev_password@postgres:5432/pcara_dev
    depends_on:
      - redis
      - postgres
    volumes:
      - ./services/analyzers/javascript:/app
      - /tmp/pcara-repos:/tmp/repos
    restart: unless-stopped

  # Polyglot Cross-Language Analyzer
  polyglot-analyzer:
    build:
      context: ./services/polyglot-analyzer
      dockerfile: Dockerfile.dev
    container_name: pcara-polyglot-analyzer-dev
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://pcara_user:pcara_dev_password@postgres:5432/pcara_dev
    depends_on:
      - redis
      - postgres
    volumes:
      - ./services/polyglot-analyzer:/app
      - /tmp/pcara-repos:/tmp/repos
    restart: unless-stopped

  # Frontend Development Server
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: pcara-frontend-dev
    ports:
      - "3001:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      REACT_APP_API_URL: http://localhost:8081
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  chromadb_data: